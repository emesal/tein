# git-cliff configuration for tein
# https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog

All notable changes to tein are documented here.
Versions follow [Semantic Versioning](https://semver.org/).

"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | upper_first }}{% if commit.breaking %} ⚠️ **BREAKING**{% endif %} ([`{{ commit.id | truncate(length=7, end="") }}`](https://github.com/emesal/tein/commit/{{ commit.id }}))
{% endfor %}
{% endfor %}\n
"""
trim = true
output = "CHANGELOG.md"
postprocessors = []

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false

# Normalize some sloppy non-scoped forms before parsing
commit_preprocessors = [
    # strip trailing periods
    { pattern = '\.+$', replace = "" },
]

commit_parsers = [
    # skip release squash commits, bumps, cargo noise, and merge commits
    { message = "^Release v",         skip = true },
    { message = "^bump",              skip = true },
    { message = "^cargo update",      skip = true },
    { message = "^Merge branch",      skip = true },
    { message = "^Merge pull",        skip = true },
    { message = "^style",             skip = true },
    { message = "^fmt",               skip = true },
    { message = "^todo",              skip = true },
    { message = "^plan",              skip = true },
    { message = "^design",            skip = true },

    # conventional types → changelog sections
    { message = "^feat",      group = "Features" },
    { message = "^fix",       group = "Bug Fixes" },
    { message = "^refactor",  group = "Refactoring" },
    { message = "^perf",      group = "Performance" },
    { message = "^test",      group = "Tests" },
    { message = "^docs",      group = "Documentation" },
    { message = "^chore",     group = "Chores" },

    # catch-all: skip everything else (ci, infra noise, etc.)
    { message = ".*",         skip = true },
]

protect_breaking_commits = false
filter_commits = true
tag_pattern = "v[0-9].*"
# ignore the branch/feature tags from the justfile workflow
ignore_tags = "^(feature|bugfix|refactor|chore|docs|hotfix)/"
sort_commits = "oldest"
