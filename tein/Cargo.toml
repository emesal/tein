[package]
name = "tein"
version = "0.1.0"
edition = "2024"
authors = ["fey"]
license = "MIT OR Apache-2.0"
description = "embeddable r7rs scheme interpreter for rust, built on chibi-scheme"
repository = "https://github.com/emesal/tein"
keywords = ["scheme", "lisp", "scripting", "embedding", "r7rs"]
categories = ["embedded", "parser-implementations"]

[dependencies]
tein-macros = { path = "../tein-macros" }

[build-dependencies]
cc = "1.0"
